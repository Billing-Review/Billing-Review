name: 🤖 Claude PR Review (Reusable)

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number
      repo_name:
        required: true
        type: string
      manual_trigger:
        required: false
        type: boolean
        default: false
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      SLACK_WEBHOOK_URL:
        required: false
      ORG_GITHUB_TOKEN:
        required: true

jobs:
  claude-review:
    runs-on:
      group: claude-code-review

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 📥 Checkout target repository
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.repo_name }}
          fetch-depth: 0
          token: ${{ secrets.ORG_GITHUB_TOKEN }}

      - name: 📥 Checkout shared config
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/Billing-Review
          path: .shared-config
          token: ${{ secrets.ORG_GITHUB_TOKEN }}

      - name: 🔑 Validate Claude authentication
        id: auth-check
        run: |
          if claude --version > /dev/null 2>&1; then
            echo "cli_installed=true" >> $GITHUB_OUTPUT
          else
            echo "cli_installed=false" >> $GITHUB_OUTPUT
            echo "::error::Claude Code CLI가 이 Runner에 설치되어 있지 않습니다."
            exit 1
          fi
      - name: Debug
        run: |
          echo "HOME=$HOME"
          echo "USER=$(whoami)"
          ls ~/.claude/ 2>/dev/null || echo "~/.claude not found"
          ls ~/.config/claude/ 2>/dev/null || echo "~/.config/claude not found"

      - name: 🤖 Claude Code Review
        env:
          SHARED_CONFIG_DIR: .shared-config/review-config
          GH_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          HOME: /Users/nhn
        run: |
          python3 .shared-config/scripts/claude_review.py \
            "${{ inputs.pr_number }}" \
            "${{ inputs.repo_name }}"
          

