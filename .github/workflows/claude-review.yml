name: 🤖 Claude PR Review (Reusable)

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      repo_name:
        required: true
        type: string
      manual_trigger:
        required: false
        type: boolean
        default: false
    secrets:
      CODE_REVIEW_APP_ID:
        required: true
      CODE_REVIEW_APP_PRIVATE_KEY:
        required: true
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  claude-review:
    runs-on:
      group: claude-code-review

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 🔍 Parse repo owner and name
        id: parse-repo
        run: |
          IFS='/' read -r owner repo <<< "${{ inputs.repo_name }}"
          echo "owner=$owner" >> $GITHUB_OUTPUT
          echo "repo=$repo" >> $GITHUB_OUTPUT

      - name: 🔑 Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CODE_REVIEW_APP_ID }}
          private-key: ${{ secrets.CODE_REVIEW_APP_PRIVATE_KEY }}
          owner: ${{ steps.parse-repo.outputs.owner }}
          repositories: ${{ steps.parse-repo.outputs.repo }}, Billing-Review

      - name: 📥 Checkout target repository
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.repo_name }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: 📥 Checkout shared config
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/Billing-Review
          path: .shared-config
          token: ${{ steps.app-token.outputs.token }}

      - name: 🔑 Validate Claude CLI
        run: |
          if ! claude --version > /dev/null 2>&1; then
            echo "::error::Claude Code CLI가 이 Runner에 설치되어 있지 않습니다."
            exit 1
          fi
          echo "✅ Claude CLI 확인됨: $(claude --version)"

      - name: 🤖 Claude Code Review
        env:
          SHARED_CONFIG_DIR: .shared-config/claude-review-config
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          python3 .shared-config/scripts/claude_review.py \
            "${{ inputs.pr_number }}" \
            "${{ inputs.repo_name }}" \
            "${{ inputs.manual_trigger }}"
