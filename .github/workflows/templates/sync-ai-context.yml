name: Sync AI Context

on:
  pull_request:
    types: [closed]
    branches: [develop]
    paths:
      - '**/*.java'
      - '**/*.kt'
      - '**/*.kts'
      - 'src/main/**'
      - 'src/test/**'
      - 'pom.xml'
      - '**/pom.xml'
      - 'build.gradle'
      - 'build.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - '**/build.gradle'
      - '**/build.gradle.kts'
  workflow_dispatch:

jobs:
  sync:
    # PR이 실제로 merge 된 경우에만 실행 (close 만 된 경우 skip)
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    uses: dev-billing/shared-workflows/.github/workflows/sync-ai-context.yml@main
    with:
      repo-name: ${{ github.event.repository.name }}
      context-repo: billing-context
    secrets: inherit
