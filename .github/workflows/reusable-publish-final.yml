name: Reusable - Publish API Doc Final

on:
  workflow_call:
    inputs:
      api_key:
        required: true
        type: string
        description: "레지스트리 키 (예: GET /api/v1/todos)"
      repo_name:
        required: true
        type: string
        description: "서비스 저장소 이름 (org/repo)"
      draft_page_id:
        required: false
        type: string
        default: ""
        description: "Dooray Draft 페이지 ID (registry 미등록 시 fallback)"
    secrets:
      CODE_REVIEW_APP_ID:
        required: true
      CODE_REVIEW_APP_PRIVATE_KEY:
        required: true
      DOORAY_API_KEY:
        required: true
    outputs:
      page_id:
        description: "본 페이지 ID"
        value: ${{ jobs.publish.outputs.page_id }}
      page_url:
        description: "본 페이지 URL"
        value: ${{ jobs.publish.outputs.page_url }}

jobs:
  publish:
    runs-on:
      group: billing-dev
    outputs:
      page_id: ${{ steps.publish.outputs.page_id }}
      page_url: ${{ steps.publish.outputs.page_url }}

    steps:
      - name: Clean workspace
        run: find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CODE_REVIEW_APP_ID }}
          private-key: ${{ secrets.CODE_REVIEW_APP_PRIVATE_KEY }}

      - name: Checkout shared-workflows (스크립트 파일용)
        uses: actions/checkout@v4
        with:
          repository: dev-billing/shared-workflows
          token: ${{ steps.app-token.outputs.token }}
          path: shared-config

      - name: Publish Final to Dooray Wiki
        id: publish
        env:
          DOORAY_API_KEY: ${{ secrets.DOORAY_API_KEY }}
          ORG_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          API_KEY: ${{ inputs.api_key }}
          REPO_NAME: ${{ inputs.repo_name }}
          DRAFT_PAGE_ID: ${{ inputs.draft_page_id }}
        run: python3 shared-config/scripts/api-docs/publish_final.py

      - name: Cleanup workspace
        if: always()
        run: find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true

      - name: Summary
        run: |
          echo "## 본 페이지 반영 완료" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| 항목 | 값 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| repo | ${{ inputs.repo_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API Key | ${{ inputs.api_key }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 페이지 ID | ${{ steps.publish.outputs.page_id }} |" >> "$GITHUB_STEP_SUMMARY"
