name: Reusable - Handle Deprecated APIs

on:
  workflow_call:
    inputs:
      deleted_endpoints:
        required: true
        type: string
        description: "삭제된 엔드포인트 목록 (줄바꿈 구분, 예: GET /api/v1/todos\nPOST /api/v1/todos)"
      repo_name:
        required: true
        type: string
        description: "서비스 저장소 이름 (org/repo)"
    secrets:
      ORG_GITHUB_TOKEN:
        required: true
      DOORAY_API_KEY:
        required: true
      DOORAY_WIKI_ID:
        required: true

jobs:
  handle-deprecated:
    runs-on:
      group: billing-dev

    steps:
      - name: Clean workspace
        run: find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true

      - name: Checkout shared-workflows (스크립트 및 registry 파일용)
        uses: actions/checkout@v4
        with:
          repository: dev-billing/shared-workflows
          token: ${{ secrets.ORG_GITHUB_TOKEN }}
          path: shared-config

      - name: Handle deprecated APIs
        env:
          DOORAY_API_KEY: ${{ secrets.DOORAY_API_KEY }}
          DOORAY_WIKI_ID: ${{ secrets.DOORAY_WIKI_ID }}
          DELETED_ENDPOINTS: ${{ inputs.deleted_endpoints }}
          REPO_NAME: ${{ inputs.repo_name }}
        run: python3 shared-config/scripts/reusable-deprecated-handler.py

      - name: Cleanup workspace
        if: always()
        run: find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true
