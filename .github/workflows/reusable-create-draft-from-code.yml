name: Reusable - Create API Doc Draft from Code

on:
  workflow_call:
    inputs:
      repo_name:
        required: true
        type: string
      branch:
        required: true
        type: string
        description: "코드를 읽을 브랜치"
      http_method:
        required: true
        type: string
        description: "HTTP 메서드 (GET, POST, PUT, DELETE, PATCH)"
      api_paths:
        required: true
        type: string
        description: "쉼표로 구분된 REST API URL 경로"
      url_hint:
        required: false
        type: string
        default: ""
        description: "위키 경로 힌트 (internal/external). 미입력 시 자동 감지"
    secrets:
      ORG_GITHUB_TOKEN:
        required: true
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      DOORAY_API_KEY:
        required: true
      DOORAY_WIKI_ID:
        required: true
      DOORAY_PROJECT_ID:
        required: true
      DOORAY_DRAFT_PARENT_PAGE_ID:
        required: true
    outputs:
      api_key:
        description: "정규화된 레지스트리 키 (예: GET /api/v1/todos)"
        value: ${{ jobs.create.outputs.api_key }}
      draft_page_id:
        description: "생성된 Dooray Draft 페이지 ID"
        value: ${{ jobs.create.outputs.draft_page_id }}
      page_url:
        description: "생성된 Dooray Draft 페이지 URL"
        value: ${{ jobs.create.outputs.page_url }}

jobs:
  create:
    runs-on:
      group: billing-dev
    outputs:
      api_key: ${{ steps.create-draft.outputs.api_key }}
      draft_page_id: ${{ steps.create-draft.outputs.draft_page_id }}
      page_url: ${{ steps.create-draft.outputs.page_url }}

    steps:
      - name: Clean workspace
        run: find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true

      - name: Checkout calling repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo_name }}
          ref: ${{ inputs.branch }}
          token: ${{ secrets.ORG_GITHUB_TOKEN }}

      - name: Checkout shared-workflows
        uses: actions/checkout@v4
        with:
          repository: dev-billing/shared-workflows
          token: ${{ secrets.ORG_GITHUB_TOKEN }}
          path: shared-config

      - name: Validate Claude CLI
        run: |
          if ! claude --version > /dev/null 2>&1; then
            echo "::error::Claude Code CLI가 이 Runner에 설치되어 있지 않습니다."
            exit 1
          fi
          echo "✅ Claude CLI 확인됨: $(claude --version)"

      - name: Create Draft from Code
        id: create-draft
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          DOORAY_API_KEY: ${{ secrets.DOORAY_API_KEY }}
          DOORAY_WIKI_ID: ${{ secrets.DOORAY_WIKI_ID }}
          DOORAY_PROJECT_ID: ${{ secrets.DOORAY_PROJECT_ID }}
          DOORAY_DRAFT_PARENT_PAGE_ID: ${{ secrets.DOORAY_DRAFT_PARENT_PAGE_ID }}
          ORG_GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          REPO_NAME: ${{ inputs.repo_name }}
          BRANCH: ${{ inputs.branch }}
          HTTP_METHOD: ${{ inputs.http_method }}
          API_PATHS: ${{ inputs.api_paths }}
          URL_HINT_INPUT: ${{ inputs.url_hint }}
        run: python3 shared-config/scripts/api-docs/create_draft_from_code.py

      - name: Cleanup workspace
        if: always()
        run: find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true

      - name: Summary
        run: |
          echo "## Draft 생성 완료" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| 항목 | 값 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| API Key | ${{ steps.create-draft.outputs.api_key }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Draft URL | ${{ steps.create-draft.outputs.page_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Dooray에서 Draft를 검토한 뒤, 이 워크플로우 실행 화면으로 돌아와 **Approve** 하세요." >> "$GITHUB_STEP_SUMMARY"
