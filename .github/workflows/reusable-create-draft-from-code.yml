name: Reusable - Create API Doc Draft from Code

on:
  workflow_call:
    inputs:
      api_key:
        required: true
        type: string
        description: "레지스트리 키 (예: GET /api/v1/todos)"
      repo_name:
        required: true
        type: string
        description: "서비스 저장소 이름 (org/repo)"
      branch:
        required: false
        type: string
        default: "master"
        description: "코드를 읽을 브랜치"
    secrets:
      CODE_REVIEW_APP_ID:
        required: true
      CODE_REVIEW_APP_PRIVATE_KEY:
        required: true
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      DOORAY_API_KEY:
        required: true
    outputs:
      draft_page_id:
        description: "생성된 Draft 페이지 ID"
        value: ${{ jobs.create.outputs.draft_page_id }}
      page_url:
        description: "생성된 Draft 페이지 URL"
        value: ${{ jobs.create.outputs.page_url }}

jobs:
  create:
    runs-on:
      group: billing-dev
    outputs:
      draft_page_id: ${{ steps.create-draft.outputs.draft_page_id }}
      page_url: ${{ steps.create-draft.outputs.page_url }}

    steps:
      - name: Clean workspace
        run: find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CODE_REVIEW_APP_ID }}
          private-key: ${{ secrets.CODE_REVIEW_APP_PRIVATE_KEY }}

      - name: Checkout service repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo_name }}
          ref: ${{ inputs.branch }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Checkout shared-workflows
        uses: actions/checkout@v4
        with:
          repository: dev-billing/shared-workflows
          token: ${{ steps.app-token.outputs.token }}
          path: shared-config

      - name: Validate Claude CLI
        run: |
          if ! claude --version > /dev/null 2>&1; then
            echo "::error::Claude Code CLI가 이 Runner에 설치되어 있지 않습니다."
            exit 1
          fi
          echo "✅ Claude CLI 확인됨: $(claude --version)"

      - name: Create Draft from Code
        id: create-draft
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          DOORAY_API_KEY: ${{ secrets.DOORAY_API_KEY }}
          ORG_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          API_KEY: ${{ inputs.api_key }}
          REPO_NAME: ${{ inputs.repo_name }}
        run: python3 shared-config/scripts/api-docs/create_draft_from_code.py

      - name: Cleanup workspace
        if: always()
        run: find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true

      - name: Summary
        run: |
          echo "## Draft 생성 완료" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| 항목 | 값 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| API Key | ${{ inputs.api_key }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Draft URL | ${{ steps.create-draft.outputs.page_url }} |" >> "$GITHUB_STEP_SUMMARY"
