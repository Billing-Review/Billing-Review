name: Reusable - Generate API Doc from Diff

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number
      repo_name:
        required: true
        type: string
    secrets:
      GITHUB_TOKEN:
        required: true
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
    outputs:
      doc_content:
        description: "생성된 API 문서 마크다운"
        value: ${{ jobs.generate.outputs.doc_content }}
      title:
        description: "위키 페이지 제목"
        value: ${{ jobs.generate.outputs.title }}
      url_hint:
        description: "위키 경로 분류용 힌트 (internal/external/'')"
        value: ${{ jobs.generate.outputs.url_hint }}
      skipped:
        description: "API 변경 없으면 true"
        value: ${{ jobs.generate.outputs.skipped }}

jobs:
  generate:
    runs-on:
      group: billing-dev
    outputs:
      doc_content: ${{ steps.generate-doc.outputs.doc_content }}
      title: ${{ steps.generate-doc.outputs.title }}
      url_hint: ${{ steps.generate-doc.outputs.url_hint }}
      skipped: ${{ steps.generate-doc.outputs.skipped }}

    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout shared-workflows (스크립트 및 프롬프트 파일용)
        uses: actions/checkout@v4
        with:
          repository: dev-billing/shared-workflows
          token: ${{ secrets.GITHUB_TOKEN }}
          path: shared-config

      - name: Validate Claude CLI
        run: |
          if ! claude --version > /dev/null 2>&1; then
            echo "::error::Claude Code CLI가 이 Runner에 설치되어 있지 않습니다."
            exit 1
          fi
          echo "✅ Claude CLI 확인됨: $(claude --version)"

      - name: Generate API doc from diff
        id: generate-doc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO_NAME: ${{ inputs.repo_name }}
        run: python3 shared-config/scripts/reusable-doc-from-diff.py
