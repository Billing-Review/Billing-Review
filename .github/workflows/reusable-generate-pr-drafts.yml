name: Reusable - Generate PR API Doc Drafts

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number
        description: "PR 번호"
      repo_name:
        required: true
        type: string
        description: "서비스 저장소 이름 (org/repo)"
      mode:
        required: false
        type: string
        default: "all"
        description: "draft=변경API draft생성, deprecated=삭제API처리, all=둘다, delete_draft=draft삭제"
    secrets:
      CODE_REVIEW_APP_ID:
        required: true
      CODE_REVIEW_APP_PRIVATE_KEY:
        required: true
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      DOORAY_API_KEY:
        required: true

jobs:
  generate:
    runs-on:
      group: billing-dev

    steps:
      - name: Clean workspace
        run: find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CODE_REVIEW_APP_ID }}
          private-key: ${{ secrets.CODE_REVIEW_APP_PRIVATE_KEY }}
          owner: dev-billing

      - name: Checkout calling repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo_name }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Checkout shared-workflows
        uses: actions/checkout@v4
        with:
          repository: dev-billing/shared-workflows
          token: ${{ steps.app-token.outputs.token }}
          path: shared-config

      - name: Validate Claude CLI
        run: |
          if ! claude --version > /dev/null 2>&1; then
            echo "::error::Claude Code CLI가 이 Runner에 설치되어 있지 않습니다."
            exit 1
          fi
          echo "✅ Claude CLI 확인됨: $(claude --version)"

      - name: Generate PR Drafts
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          DOORAY_API_KEY: ${{ secrets.DOORAY_API_KEY }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO_NAME: ${{ inputs.repo_name }}
          GENERATE_MODE: ${{ inputs.mode }}
        run: python3 shared-config/scripts/api-docs/generate_pr_drafts.py

      - name: Cleanup workspace
        if: always()
        run: find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true
